# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for reputation-pool.
# The project's design principles are enforced as review guidance below.

language: "en-US"
early_access: false

tone_instructions: >-
  Act as a demanding senior reviewer for reputation-pool. No praise or filler — only well-grounded,
  concise findings. Priority order: correctness & invariants -> concurrency -> core purity ->
  simplification & readability. Require unverified decision logic to be proven with a property or
  concurrency test. Also flag noisy comments (comments that restate the name, uniform per-method
  Javadoc, prose tics).

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

  # Exclude build outputs and the wrapper from review.
  path_filters:
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!**/gradle/wrapper/**"

  path_instructions:
    - path: "reputation-pool-core/src/main/**/*.java"
      instructions: >-
        core must be pure Java (JDK only). Flag any framework import (Spring/Netty/JDBC/gRPC) — the
        boundary is enforced by ArchUnit, but confirm it in review too. Check that decision logic is
        a side-effect-free pure function, that domain state is immutable (records), and that time is
        obtained only through an injected Clock (no direct now()/System.currentTimeMillis()). Verify
        invariants are enforced in the constructor (compact constructor) or the type, not scattered
        as if-checks. Also enforce comment discipline: comments that restate the name, uniform
        Javadoc, and prose tics are noise — suggest deletion. The only comments worth keeping explain
        a non-obvious "why" (a trade-off, a pitfall, a constraint from an external system).

    - path: "**/engine/**"
      instructions: >-
        This is the decision engine. (1) Confirm apply(...)-style methods do not mutate the input
        cell and return a new cell as a pure function. (2) Confirm the score stays bounded, recovery
        on success is monotonic, and a failure in one context never affects another context's cell —
        and that these invariants are covered by property tests. (3) Confirm switches over the sealed
        Outcome / enum FailureType are exhaustive without a default.

    - path: "**/{pool,lease,blocklist}/**"
      instructions: >-
        This is a concurrency path. (1) Confirm shared-state updates go through atomic operations
        (ConcurrentHashMap.compute()/putIfAbsent) with no check-then-act races. (2) Confirm lease
        exclusivity (one resource is held by exactly one holder at a time) and that there is a path
        to reclaim leases from dead holders. (3) Confirm these properties are verified by a
        multi-thread test that reproduces real contention.

    - path: "**/port/**"
      instructions: >-
        These are core's I/O boundary interfaces. Confirm core depends on interfaces rather than
        implementations, and that storage/observability/probe details do not leak into core.

    - path: "**/src/test/**"
      instructions: >-
        Tests. (1) Confirm invariants are covered by property tests (jqwik) and concurrency by
        multi-thread tests that reproduce real contention. (2) Confirm time-dependent logic is
        verified deterministically with Clock.fixed(). (3) Flag tautological tests that look
        plausible but assert nothing meaningful.

chat:
  auto_reply: true
