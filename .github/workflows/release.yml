name: Release

# The tag IS the version. Push v<major>.<minor>.<patch> and this workflow builds, signs, and
# publishes reputation-pool-core to Maven Central, then cuts a GitHub Release. A big release
# bumps the major (v1.0.0 -> v2.0.0 -> v3.0.0); a small one bumps the patch (v2.0.0 -> v2.0.1).
# Semver via the tag name — no version lives in a committed file, so no machine holds the keys.
#
# Signing key + Central credentials come from repository Secrets (see the env block on the publish
# step), so a release no longer depends on whichever laptop happens to have ~/.gradle/gradle.properties.
on:
  push:
    tags: [ 'v*.*.*' ]
  # Manual button in the Actions UI: type a version, this tags the current commit and releases it.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, without the leading v (e.g. 0.2.0, 1.0.0, 2.0.1)'
        required: true
        type: string

# Never let a fork's tag push try to publish with (absent) upstream secrets.
jobs:
  release:
    name: Publish to Maven Central
    if: github.repository == 'PreAgile/reputation-pool'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release, and push the tag on manual dispatch
    steps:
      - uses: actions/checkout@v7

      # Resolve the version once, from whichever trigger fired, and validate it is strict semver
      # (X.Y.Z, digits only) so a typo cannot publish a garbage coordinate to an immutable registry.
      - name: Resolve and validate version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' is not strict semver X.Y.Z"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      # Manual dispatch has no tag yet: create v<version> on this commit and push it, so the release
      # is anchored to a real tag (the repo's release discipline) exactly like the tag-push path.
      - name: Tag the commit (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Gate on the full build before publishing anything: an immutable Central release must not ship
      # a broken artifact. (Docker/Lincheck gates stay in ci.yml; this is the fast unit/property gate.)
      - name: Build & test
        run: ./gradlew build --no-daemon

      # Publish + auto-release in one shot. vanniktech reads each ORG_GRADLE_PROJECT_* env var as the
      # matching Gradle property (signingInMemoryKey, mavenCentralUsername, ...), so no key touches disk.
      # The signing key is passphrase-less, so signingInMemoryKeyPassword is intentionally not set.
      - name: Publish core to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
        run: |
          ./gradlew :reputation-pool-core:publishAndReleaseToMavenCentral \
            -PreleaseVersion="${{ steps.version.outputs.version }}" \
            --no-daemon --no-configuration-cache --stacktrace

      # Cut the GitHub Release from the tag with auto-generated notes from merged PRs since the last tag.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
