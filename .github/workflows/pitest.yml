# Mutation testing as a scheduled quality probe (#27, per-module matrix since #45). Too slow for
# the PR gate, so it runs nightly and on demand. Ratchet policy: CONTRIBUTING.md.
name: Mutation Testing

on:
  schedule:
    - cron: '0 2 * * *'   # nightly, 02:00 UTC
  workflow_dispatch:

jobs:
  pitest:
    name: PIT (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [core, persistence, server, adapters]
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run PIT mutation testing
        run: ./gradlew :reputation-pool-${{ matrix.module }}:pitest --no-daemon

      - name: Upload mutation report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: pitest-report-${{ matrix.module }}
          path: reputation-pool-${{ matrix.module }}/build/reports/pitest/
          if-no-files-found: ignore
