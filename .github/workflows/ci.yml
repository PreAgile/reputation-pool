name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel an in-progress run when a new push lands on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest   # once the server module lands, the runner's Docker powers Testcontainers
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # build gates everything at once: spotlessCheck (format) + tests (unit/property/concurrency + ArchUnit)
      - name: Build, Format check, Arch & Test
        run: ./gradlew build --no-daemon

      # The persistence integration tests are deliberately excluded from `build` (they need Docker) and
      # run here, where the runner's Docker daemon powers Testcontainers against a real PostgreSQL.
      - name: Persistence integration tests (Testcontainers)
        run: ./gradlew :reputation-pool-persistence:integrationTest --no-daemon

      # Linearizability proofs are likewise excluded from `build` (model checking explores thread
      # interleavings for minutes, not seconds) and run here as their own gate.
      - name: Lincheck linearizability tests
        run: ./gradlew :reputation-pool-core:lincheckTest --no-daemon

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore

  # A separate gate from the Gradle build on purpose: the proto contract is a different
  # responsibility (wire compatibility, not code correctness) and this fails in seconds
  # without waiting on the JDK toolchain, tests, or Docker. advisor.proto is a public
  # contract; buf breaking diffs it against main and fails on any backward-incompatible
  # change (deleted field, reused number, changed type) that the jqwik round-trips cannot
  # see — they prove the current proto maps to the domain, not that it stays wire-compatible
  # with the contract already on main.
  proto-contract:
    name: Proto breaking-change check
    runs-on: ubuntu-latest
    steps:
      # Read-only job: the breaking check fetches the baseline over a public HTTPS git URL,
      # so the checkout token does not need to linger in git config afterwards.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: bufbuild/buf-action@v1
        with:
          # Pin the CLI so the check is reproducible and a new buf release cannot change the
          # verdict without a commit here. Matches the version the guard was validated against.
          version: 1.71.0
          breaking: true
          # subdir pins the module root so file paths match on both sides. It also keeps this
          # bootstrap PR green: main has no buf.yaml yet, so a plain ref would read the proto at
          # its full repo path and report a spurious "file deleted". Switch the ref to release
          # tags once the server ships versioned releases.
          breaking_against: https://github.com/${{ github.repository }}.git#branch=main,subdir=reputation-pool-grpc/src/main/proto
          # This job guards the contract only: lint/format would flag pre-existing style the issue
          # deliberately leaves alone, push needs a BSR token, and the PR comment needs write scope.
          lint: false
          format: false
          push: false
          pr_comment: false
