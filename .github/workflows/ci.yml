name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel an in-progress run when a new push lands on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest   # once the server module lands, the runner's Docker powers Testcontainers
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # build gates everything at once: spotlessCheck (format) + tests (unit/property/concurrency + ArchUnit)
      - name: Build, Format check, Arch & Test
        run: ./gradlew build --no-daemon

      # The persistence integration tests are deliberately excluded from `build` (they need Docker) and
      # run here, where the runner's Docker daemon powers Testcontainers against a real PostgreSQL.
      - name: Persistence integration tests (Testcontainers)
        run: ./gradlew :reputation-pool-persistence:integrationTest --no-daemon

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
