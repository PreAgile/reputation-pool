name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 같은 브랜치에서 새 푸시가 오면 진행 중인 실행을 취소
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest   # server 모듈이 붙으면 러너의 Docker 로 Testcontainers 실 DB 동작
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # build = spotlessCheck(포맷) + test(단위·property·동시성 + ArchUnit 경계) 를 한 번에 게이트
      - name: Build, Format check, Arch & Test
        run: ./gradlew build --no-daemon

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
