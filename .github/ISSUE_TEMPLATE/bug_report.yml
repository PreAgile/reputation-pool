name: Bug report
description: Report a defect in reputation-pool
labels: ["type: bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill in the sections below so the issue
        can be reproduced. A failing test is the most useful thing you can provide.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal code snippet or a failing test.
      placeholder: |
        1. Build a ResourcePool with ...
        2. Call acquire(...) / report(...)
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exception and stack trace if there is one.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: reputation-pool version or commit SHA.
    validations:
      required: true

  - type: input
    id: java
    attributes:
      label: Java version
      description: Output of `java -version`.
    validations:
      required: true
